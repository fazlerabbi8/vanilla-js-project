<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisyUI connect here-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <!-- navbar starts here -->
    <nav>
        <div class="navbar bg-[#F9F7F3] shadow-sm min-h-0 h-[72px]">
            <div class="max-w-[1440px] w-full mx-auto px-6 flex items-center">

                <!--Blog Button -->
                <div class="flex-1">
                    <button
                        class="btn bg-[#B4F461] border-none text-black font-semibold h-[40px] min-h-0 px-6">Blog</button>
                </div>

                <!--Logo + Title -->
                <div class="flex items-center gap-2">
                    <img class="h-10 w-10" src="assets/logo.png" alt="logo">
                    <span class="text-xl font-bold">Donate Bangladesh</span>
                </div>

                <!--Coin + BDT -->
                <div class="flex-1 flex justify-end items-center gap-2">
                    <img class="h-7 w-7" src="assets/coin.png" alt="coin">
                    <h3 class="font-bold text-gray-500">5500 <span>BDT</span></h3>
                </div>

            </div>
        </div>
    </nav>
    <!-- navbar end here-->
</body>

</html>
