<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisyUI connect here-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <!-- navbar starts here -->
    <nav>
        <div class="navbar bg-[#F9F7F3] shadow-sm min-h-0 h-[72px]">
            <div class="max-w-[1440px] w-full mx-auto px-6 flex items-center">

                <!--Blog Button -->
                <div class="flex-1">
                    <button
                        class="btn bg-[#B4F461] border-none text-black font-semibold h-[40px] min-h-0 px-6">Blog</button>
                </div>

                <!--Logo + Title -->
                <div class="flex items-center gap-2">
                    <img class="h-10 w-10" src="assets/logo.png" alt="logo">
                    <span class="text-xl font-bold">Donate Bangladesh</span>
                </div>

                <!--Coin + BDT -->
                <div class="flex-1 flex justify-end items-center gap-2">
                    <img class="h-7 w-7" src="assets/coin.png" alt="coin">
                    <h3 class="font-bold text-gray-500">5500 <span>BDT</span></h3>
                </div>

            </div>
        </div>
    </nav>
    <!-- navbar end here-->

    <!-- main section -->
    <main>
        <!-- toggle button here:Donation + History -->
        <div class="flex gap-3 justify-center items-center mx-auto mt-10">
            <button id="btn-donation" onclick="setActive('donation')"
                class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl">Donation</button>
            <button tton id="btn-history" onclick="setActive('history')"
                class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-xl">History</button>
        </div>

        <!-- Donation Section -->
        <div id="donation-section" class="mt-6">
            <div>
                 
            </div>
        </div>

        <!-- History Section -->
        <div id="history-section" class="mt-6 hidden">
            <p>History content goes here...</p>
        </div>
    </main>


    <!-- scripts-->
    <script src="/Js/index.js"></script>
</body>

</html>
